<!DOCTYPE html>
<html>

<head>
    <title>Network Sniffer Dashboard</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        h3 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Network Packet Sniffer</h1>

    <h3>Total Packets: <span id="packetCount">0</span></h3>
    <div style="text-align:center; margin-bottom:20px;">

<button onclick="startCapture()">
Start Capture
</button>

<button onclick="stopCapture()">
Stop Capture
</button>

</div>

    <table>

        <thead>
            <tr>
                <th>Source IP</th>
                <th>Destination IP</th>
                <th>Domain</th>
                <th>Protocol</th>
            </tr>
        </thead>

        <tbody id="packetTable">
        </tbody>

    </table>


    <script>
async function startCapture() {
    await fetch('/start');
}

async function stopCapture() {
    await fetch('/stop');
}

async function loadPackets() {
    let response = await fetch('/packets');
    let data = await response.json();

    document.getElementById("packetCount").innerText = data.length;

    let rows = "";

    [...data].reverse().forEach(packet => {
        rows += `
        <tr>
            <td>${packet.source}</td>
            <td>${packet.destination}</td>
            <td>${packet.domain}</td>
            <td>${packet.protocol}</td>
        </tr>
        `;
    });

    document.getElementById("packetTable").innerHTML = rows;
}

setInterval(loadPackets, 2000);
loadPackets();
</script>

</body>

</html>
